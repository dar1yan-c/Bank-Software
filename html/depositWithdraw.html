<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deposit/Withdraw</title>
    <link rel="stylesheet" href="/css/depositWithdraw.css" />
    <script src="/js/header.js"></script>
    <link rel="stylesheet" href="/css/header.css" />
    <script src="/js/footer.js"></script>
    <link rel="stylesheet" href="/css/footer.css" />
  </head>
  <body>
    <main-header></main-header>
    <div class="container">
      <div class="box">
        <div class="title">
          <h1>Balance</h1>
        </div>
        <div class="balance">
          <h2>0$</h2>
        </div>
        <div class="inputBox">
          <input type="number" name="moneyInput" id="moneyInput" required/>
          <label for="moneyInput">Money</label>
        </div>
        <div class="buttons">
          <button class="depositButton">Deposit</button>
          <button class="withdrawButton">Withdraw</button>
        </div>
      </div>
    </div>
    <main-footer></main-footer>
    <script src="/js/depositWithdraw.js"></script>
  </body>
</html>
